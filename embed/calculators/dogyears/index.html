<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- SEO: credit this content to the parent page, not the iframe URL -->
  <link rel="canonical" href="https://thelongevityinitiative.org/calculators/dogyears/">

  <!-- Encourage browsers to send Referer header when embedded externally -->
  <meta name="referrer" content="strict-origin-when-cross-origin">

  <!-- Future-proof light/dark mode support -->
  <meta name="color-scheme" content="light dark">

  <title>Dog age calculator — The Longevity Initiative</title>

  <link rel="stylesheet" href="../../shared/fonts/inter.css">
  <link rel="stylesheet" href="../../shared/embed.css">
  <link rel="stylesheet" href="dogyears.css">
  <script src="dogyears.js"></script>
</head>
<body>
  <h1 id="pageTitle">Dog age calculator</h1>

  <p id="pageIntro">Convert your dog's age to human-equivalent years using an epigenetic formula based on DNA methylation patterns.</p>

  <div id="dogYearsForm" class="bioageform">
    <noscript>This calculator requires JavaScript to run.</noscript>
  </div>

  <div id="dogYearsResult" class="bioageform"></div>

  <div id="aboutSection">
    <h2 id="aboutHeading">About</h2>
    <p id="aboutFormula"></p>
    <p id="aboutLimitations"></p>
    <p id="aboutCitation"></p>
  </div>

  <p class="embed-link">Want to embed this calculator on your website? <a href="https://thelongevityinitiative.org/embed/#calculators/dogyears">Get the embed code</a>.</p>

  <!-- Embed support: notify parent iframe of height changes -->
  <script>
    (function() {
      function notifyParentOfHeight() {
        window.parent.postMessage(
          { type: 'li-calculator-resize', height: document.documentElement.scrollHeight },
          '*'
        );
      }

      if (window.ResizeObserver) {
        new ResizeObserver(notifyParentOfHeight).observe(document.documentElement);
      }
      window.addEventListener('resize', notifyParentOfHeight);
      document.addEventListener('DOMContentLoaded', notifyParentOfHeight);

      window.embedConfig = Object.fromEntries
        ? Object.fromEntries(new URLSearchParams(window.location.search))
        : {};
    })();
  </script>
</body>
</html>
